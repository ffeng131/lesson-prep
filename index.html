<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>集体备课</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">

  <!-- 顶部导航 -->
  <header class="app-header">
    <button class="icon-btn" id="btnBack" aria-label="返回">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1 class="header-title">集体备课</h1>
    <span class="icon-btn placeholder"></span>
  </header>

  <!-- 主体 -->
    <!-- 固定：备课组行 -->
  <section class="group-row-fixed" id="groupRow">
    <div class="group-row-inner">
      <div class="group-name-wrap">
        <span class="group-name" id="groupName">一年级英语备课</span>
        <span class="group-leader" id="groupLeader">组长</span>
      </div>
      <button class="group-switcher" id="btnGroupSwitcher">
        <span class="switcher-text">切换</span>
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <!-- 个备进度 -->
    <div class="group-progress">
      <span class="progress-label">个备进度</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 32%"></div>
      </div>
      <span class="progress-text" id="progressText">32%</span>
    </div>
  </section>

  <!-- 主体：可滚动的目录区域 -->
  <main class="app-main">
    <div class="tree-scroll-area">
      <!-- 备课组资源区块 -->
      <section class="content-card">
        <div class="section-head">
          <h2 class="section-title">备课组资源</h2>
          <p class="section-tip">点击教学内容后开始资源上传</p>
        </div>

        <!-- 教学内容目录树（默认全部展开） -->
        <div class="tree-list" id="treeList">
          <!-- JS 渲染 -->
        </div>
      </section>
    </div>
  </main>

  <!-- 备课组切换弹层 -->
  <div class="modal" id="modalGroup" aria-hidden="true">
    <div class="modal-mask"></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <h3>切换备课组</h3>
        <button class="icon-btn" data-close>
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="groupList">
        <!-- JS 渲染 -->
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
