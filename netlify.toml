# Netlify 配置文件
# 用于部署集体备课 H5 端项目

[build]
  # 发布目录（静态文件所在目录）
  publish = "."
  
  # 构建命令（本项目为纯静态文件，无需构建）
  command = "echo 'Static files ready for deployment'"

[dev]
  # 开发服务器配置
  command = "python3 -m http.server 8080"
  port = 8080

[[redirects]]
  # 重定向规则：处理单页应用路由
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # 缓存策略配置
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  # 静态资源缓存
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # JavaScript 文件缓存
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # HTML 文件不缓存
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"